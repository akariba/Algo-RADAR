<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYBIL — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --bg2:      #111;
      --border:   rgba(255,255,255,0.08);
      --accent:   #00e5a0;
      --text:     #f0f0f0;
      --text-dim: #888;
      --error:    #ff5555;
      --success:  #00e5a0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      text-decoration: none;
    }

    .auth-logo-mark {
      width: 32px; height: 32px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900;
      color: var(--accent);
    }

    .auth-logo span {
      font-size: 18px; font-weight: 700;
      color: var(--text);
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      border: none;
      color: var(--text-dim);
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: rgba(0,229,160,0.1);
      color: var(--accent);
    }

    .auth-form { display: none; flex-direction: column; gap: 16px; }
    .auth-form.active { display: flex; }

    label {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 6px;
      display: block;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: rgba(0,229,160,0.4); }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 4px;
      transition: all 0.2s;
    }

    .btn-submit:hover { background: #00ffb3; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .auth-msg {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      display: none;
    }

    .auth-msg.error   { background: rgba(255,85,85,0.1);  border: 1px solid rgba(255,85,85,0.3);  color: var(--error);   display: block; }
    .auth-msg.success { background: rgba(0,229,160,0.1);  border: 1px solid rgba(0,229,160,0.3);  color: var(--success); display: block; }

    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }

    .auth-footer a { color: var(--accent); text-decoration: none; }

    .password-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<div class="auth-card">
  <a href="/" class="auth-logo">
    <div class="auth-logo-mark">S</div>
    <span>SYBIL</span>
  </a>

  <div class="auth-tabs">
    <button class="auth-tab active" onclick="switchTab('login', this)">Sign In</button>
    <button class="auth-tab" onclick="switchTab('register', this)">Register</button>
  </div>

  <!-- Login Form -->
  <form class="auth-form active" id="loginForm" onsubmit="submitLogin(event)">
    <div id="loginMsg" class="auth-msg"></div>
    <div>
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" required>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-submit" id="loginBtn">Sign In →</button>
  </form>

  <!-- Register Form -->
  <form class="auth-form" id="registerForm" onsubmit="submitRegister(event)">
    <div id="registerMsg" class="auth-msg"></div>
    <div>
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com" required>
    </div>
    <div>
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="••••••••" required>
      <div class="password-hint">Min 8 chars · uppercase · lowercase · digit · special char</div>
    </div>
    <button type="submit" class="btn-submit" id="registerBtn">Create Account →</button>
  </form>

  <div class="auth-footer">
    <a href="/auth/forgot-password-page">Forgot password?</a>
  </div>
</div>

<script>
function switchTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tab + 'Form').classList.add('active');
}

async function submitLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('loginMsg');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  msg.className = 'auth-msg';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      msg.className = 'auth-msg success';
      msg.textContent = 'Login successful! Redirecting…';
      setTimeout(() => window.location.href = '/app', 1000);
    } else {
      msg.className = 'auth-msg error';
      msg.textContent = data.error || 'Login failed.';
    }
  } catch {
    msg.className = 'auth-msg error';
    msg.textContent = 'Network error. Please try again.';
  }

  btn.disabled = false;
  btn.textContent = 'Sign In →';
}

async function submitRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  const msg = document.getElementById('registerMsg');
  btn.disabled = true;
  btn.textContent = 'Creating account…';
  msg.className = 'auth-msg';

  try {
    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPassword').value
      })
    });
    const data = await res.json();
    if (res.ok) {
      msg.className = 'auth-msg success';
      msg.textContent = 'Account created! Check your email to confirm.';
    } else {
      msg.className = 'auth-msg error';
      const details = data.details ? Object.values(data.details).flat().join(' ') : '';
      msg.textContent = data.error + (details ? ' ' + details : '');
    }
  } catch {
    msg.className = 'auth-msg error';
    msg.textContent = 'Network error. Please try again.';
  }

  btn.disabled = false;
  btn.textContent = 'Create Account →';
}
</script>

</body>
</html>
